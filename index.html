<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
<title>TCF EE Studio X — Expression Écrite</title>
<style>
:root {
    --bg: #eef1f7;
    --panel: #fff;
    --panel2: #f6f8fc;
    --text: #0f172a;
    --sub: #64748b;
    --accent: #1d4ed8;
    --accent2: #3b82f6;
    --border: #e2e8f0;
    --danger: #dc2626;
    --success: #16a34a;
    --warn: #d97706;
    --shadow: 0 1px 3px rgba(0, 0, 0, .25);
}

/* General enhancements */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.55;
    transition: background 0.3s, color 0.3s;
}

/* Sidebar enhancements */
.sidebar {
    width: 264px;
    min-width: 264px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: all 0.3s ease;
}

.nav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: 9px;
    cursor: pointer;
    color: var(--sub);
    font-size: 13px;
    font-weight: 600;
    transition: transform 0.2s, background-color 0.3s;
}

.nav-item:hover {
    transform: scale(1.1);
    background-color: var(--accent2);
    color: #fff;
}

/* Transitions for Sujets Section */
.combo-list, .task-content {
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s ease;
}

.combo-list.show, .task-content.show {
    opacity: 1;
    transform: translateY(0);
}

/* Buttons */
.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 9px 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    width: 100%;
    margin-bottom: 10px;
    background: linear-gradient(45deg, #6a11cb, #2575fc);
    color: #fff;
    transition: box-shadow 0.2s ease, transform 0.2s ease;
}

.btn:hover {
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    transform: translateY(-3px);
}

/* Responsive Layout */
@media (max-width: 700px) {
    .sidebar {
        width: 100% !important;
        min-width: unset;
    }
    .main {
        padding: 16px;
    }
    .nav-item {
        padding: 12px;
    }
}
</style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="brand">
            <div class="brand-icon">✍</div>
            <div>
                <h1>TCF EE Studio X</h1>
                <span class="b-name" id="brandName" style="display:none"></span>
                <span class="b-sub">Expression Écrite</span>
            </div>
        </div>
        <div class="sidebar-scroll">
            <div class="nav-item">🏠 Dashboard</div>
            <div class="nav-item">📚 Sujets</div>
            <div class="nav-item">📊 Stats</div>
        </div>
    </div>
    <div class="main">
        <div class="view">
            <h2>Welcome to the Enhanced TCF Writing App!</h2>
            <div class="combo-list show">
                <p>Month-wise sujets will appear here with smooth animations!</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
