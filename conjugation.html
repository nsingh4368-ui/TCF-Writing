<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pratique Conjugaison — TCF EE Studio X</title>
<style>
:root{--bg:#eef1f7;--panel:#fff;--panel2:#f6f8fc;--text:#0f172a;--sub:#64748b;--accent:#1d4ed8;--accent2:#3b82f6;--border:#e2e8f0;--danger:#dc2626;--success:#16a34a;--warn:#d97706;--shadow:0 1px 3px rgba(15,23,42,.07),0 8px 24px rgba(15,23,42,.06);--grad:linear-gradient(135deg,#1d4ed8,#7c3aed)}
body.dark{--bg:#0b0e14;--panel:#161a23;--panel2:#1f2430;--text:#f1f5f9;--sub:#94a3b8;--border:#2b3242;--shadow:0 1px 3px rgba(0,0,0,.35),0 8px 24px rgba(0,0,0,.45)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;line-height:1.55;min-height:100vh;padding:20px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.page-title{font-size:19px;font-weight:800}
.card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
.h3{font-size:15px;font-weight:800;margin-bottom:10px}
.muted{color:var(--sub);font-size:12.5px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:.15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(29,78,216,.2)}
.btn-primary:hover{background:#1e40af}
.btn-ghost{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--border)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
/* Level selector */
.level-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.level-tab{padding:8px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--panel2);color:var(--sub);transition:all .15s}
.level-tab:hover{border-color:var(--accent2)}
.level-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(29,78,216,.2)}
/* Verb selector grid */
.verb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;max-height:260px;overflow-y:auto;margin-bottom:12px;padding:2px}
.verb-grid::-webkit-scrollbar{width:4px}
.verb-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.verb-pill{padding:7px 10px;border-radius:9px;border:1px solid var(--border);background:var(--panel2);cursor:pointer;font-size:12.5px;font-weight:600;color:var(--text);transition:all .15s;text-align:center}
.verb-pill:hover{border-color:var(--accent2);background:var(--panel)}
.verb-pill.selected{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(29,78,216,.15)}
.verb-pill.mastered{border-color:var(--success);background:#f0fdf4;color:var(--success)}
.verb-pill.mastered.selected{background:var(--success);color:#fff}
/* Tense tabs */
.tense-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tense-tab{padding:6px 13px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--panel2);color:var(--sub);transition:all .15s}
.tense-tab:hover{border-color:var(--accent2)}
.tense-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Drill card */
.drill-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.drill-verb{font-size:28px;font-weight:800;color:var(--accent)}
.drill-tense-badge{background:var(--panel2);border:1px solid var(--border);border-radius:20px;font-size:11.5px;font-weight:700;padding:4px 12px;color:var(--sub)}
.drill-progress{font-size:12px;font-weight:700;color:var(--sub)}
.pronoun-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pronoun-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;transition:all .2s}
.pronoun-label{font-size:12px;font-weight:800;color:var(--accent);min-width:50px;flex-shrink:0}
.conj-input{flex:1;background:transparent;border:none;border-bottom:2px solid var(--border);color:var(--text);font:inherit;font-size:13px;font-weight:600;outline:none;padding:3px 4px;transition:border-color .2s}
.conj-input:focus{border-bottom-color:var(--accent2)}
.conj-input.correct{border-bottom-color:var(--success);color:var(--success)}
.conj-input.wrong{border-bottom-color:var(--danger);color:var(--danger)}
.conj-input.revealed{border-bottom-color:var(--warn);color:var(--warn);font-style:italic}
.conj-answer{font-size:11.5px;font-weight:600;color:var(--sub);display:none;margin-top:2px}
.conj-answer.show{display:block}
.drill-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
/* Score bar */
.score-strip{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--panel2);border-radius:12px;margin-bottom:14px;font-size:12.5px;font-weight:700}
.score-ok{color:var(--success)}
.score-err{color:var(--danger)}
.score-bar-wrap{flex:1;background:var(--border);border-radius:99px;height:7px;overflow:hidden}
.score-bar{height:100%;background:var(--success);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
/* Result */
.result-big{text-align:center;padding:24px 16px}
.result-emoji{font-size:54px;margin-bottom:8px}
.result-score{font-size:36px;font-weight:800;color:var(--accent);margin-bottom:6px}
.result-sub{color:var(--sub);font-size:13px}
/* Session log */
.session-log{max-height:200px;overflow-y:auto;margin-top:10px}
.log-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:8px;font-size:12px;margin-bottom:3px}
.log-item.ok{background:#f0fdf4;color:#15803d}
.log-item.err{background:#fff1f2;color:#dc2626}
body.dark .log-item.ok{background:#14532d;color:#86efac}
body.dark .log-item.err{background:#450a0a;color:#fca5a5}
/* Accents bar */
.accent-dock{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;padding:8px 10px;background:var(--panel2);border:1px solid var(--border);border-radius:10px}
.accent-btn{background:var(--panel);border:1px solid var(--border);border-radius:7px;color:var(--text);cursor:pointer;font:inherit;font-weight:700;min-height:30px;min-width:30px;font-size:13px;transition:all .15s}
.accent-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
/* Setup panel */
#setup{display:block}
#drill{display:none}
#results{display:none}
.hidden{display:none!important}
.sel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.sel-count{font-size:12px;font-weight:700;color:var(--accent)}
.tense-check-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.tense-check{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:9px;border:1px solid var(--border);background:var(--panel2);cursor:pointer;font-size:12.5px;font-weight:600;transition:all .15s;user-select:none}
.tense-check:hover{border-color:var(--accent2)}
.tense-check.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.tense-check input{display:none}
/* Dark toggle */
.dark-btn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--sub)}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shake{animation:shake .3s ease}
@media(max-width:600px){.pronoun-grid{grid-template-columns:1fr}.drill-verb{font-size:22px}.page-title{font-size:16px}}
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">🔀 Pratique Conjugaison</div>
  <button class="dark-btn" onclick="toggleDark()" title="Thème sombre">🌓</button>
</div>

<!-- SETUP PANEL -->
<div id="setup">

  <!-- Level tabs -->
  <div class="card">
    <div class="h3">1. Choisir le niveau</div>
    <div class="level-tabs">
      <div class="level-tab active" id="ltab-common" onclick="setLevel('common')">🌟 Verbes communs (1–50)</div>
      <div class="level-tab" id="ltab-b1" onclick="setLevel('b1')">📗 B1 (51–100)</div>
      <div class="level-tab" id="ltab-b2" onclick="setLevel('b2')">📘 B2 (101–200)</div>
      <div class="level-tab" id="ltab-all" onclick="setLevel('all')">🎯 Tout (1–200)</div>
    </div>

    <div class="sel-header">
      <span class="muted">Sélectionnez les verbes à pratiquer</span>
      <span class="sel-count" id="selCount">0 sélectionnés</span>
    </div>
    <div class="btn-row" style="margin-bottom:10px;margin-top:0">
      <button class="btn btn-ghost btn-sm" onclick="selectAll()">✅ Tout sélectionner</button>
      <button class="btn btn-ghost btn-sm" onclick="selectNone()">☐ Tout désélectionner</button>
      <button class="btn btn-ghost btn-sm" onclick="selectRandom(10)">🎲 10 aléatoires</button>
      <button class="btn btn-ghost btn-sm" onclick="selectRandom(20)">🎲 20 aléatoires</button>
    </div>
    <div class="verb-grid" id="verbGrid"></div>
  </div>

  <!-- Tense selector -->
  <div class="card">
    <div class="h3">2. Choisir les temps</div>
    <div class="tense-check-row" id="tenseChecks">
      <label class="tense-check on" data-tense="PR"><input type="checkbox" checked> Présent</label>
      <label class="tense-check on" data-tense="PC"><input type="checkbox" checked> Passé composé</label>
      <label class="tense-check on" data-tense="IMP"><input type="checkbox" checked> Imparfait</label>
      <label class="tense-check on" data-tense="FUT"><input type="checkbox" checked> Futur simple</label>
      <label class="tense-check on" data-tense="SUB"><input type="checkbox" checked> Subjonctif présent</label>
    </div>
  </div>

  <!-- Start -->
  <div class="card">
    <div class="h3">3. Lancer</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;cursor:pointer">
        <input type="checkbox" id="chkShuffle" checked style="width:16px;height:16px;accent-color:var(--accent)"> Mélanger l'ordre
      </label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;cursor:pointer">
        <input type="checkbox" id="chkShowHints" style="width:16px;height:16px;accent-color:var(--accent)"> Afficher les réponses si vide
      </label>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="startDrill()">🚀 Commencer la pratique</button>
    </div>
    <div id="setupError" style="display:none;margin-top:8px;padding:8px 12px;background:#fee2e2;color:#dc2626;border-radius:9px;font-size:12px;font-weight:700"></div>
  </div>

</div><!-- /setup -->


<!-- DRILL PANEL -->
<div id="drill">

  <div class="score-strip">
    <span class="score-ok" id="scoreOk">✅ 0</span>
    <span class="score-err" id="scoreErr">❌ 0</span>
    <div class="score-bar-wrap"><div class="score-bar" id="scoreBar" style="width:0%"></div></div>
    <span class="drill-progress" id="drillProg">0 / 0</span>
    <button class="btn btn-ghost btn-sm" onclick="endDrill()">⏹ Terminer</button>
  </div>

  <div class="card" id="drillCard" style="animation:slideUp .3s ease-out">
    <div class="drill-header">
      <div>
        <div class="drill-verb" id="drillVerb">—</div>
        <div style="font-size:12px;color:var(--sub);margin-top:3px" id="drillVerbMeaning"></div>
      </div>
      <div style="text-align:right">
        <div class="drill-tense-badge" id="drillTense">—</div>
        <div style="font-size:11px;color:var(--sub);margin-top:4px" id="drillAux"></div>
      </div>
    </div>

    <div class="pronoun-grid" id="pronounGrid"></div>

    <div class="accent-dock">
      <span style="font-size:10px;font-weight:700;color:var(--sub);align-self:center;margin-right:4px">Accents →</span>
      <button class="accent-btn" onclick="insertAccent('é')">é</button>
      <button class="accent-btn" onclick="insertAccent('è')">è</button>
      <button class="accent-btn" onclick="insertAccent('ê')">ê</button>
      <button class="accent-btn" onclick="insertAccent('ë')">ë</button>
      <button class="accent-btn" onclick="insertAccent('à')">à</button>
      <button class="accent-btn" onclick="insertAccent('â')">â</button>
      <button class="accent-btn" onclick="insertAccent('ç')">ç</button>
      <button class="accent-btn" onclick="insertAccent('ù')">ù</button>
      <button class="accent-btn" onclick="insertAccent('û')">û</button>
      <button class="accent-btn" onclick="insertAccent('î')">î</button>
      <button class="accent-btn" onclick="insertAccent('ï')">ï</button>
      <button class="accent-btn" onclick="insertAccent('ô')">ô</button>
      <button class="accent-btn" onclick="insertAccent('œ')">œ</button>
      <button class="accent-btn" onclick="insertAccent('É')">É</button>
      <button class="accent-btn" onclick="insertAccent('È')">È</button>
      <button class="accent-btn" onclick="insertAccent('À')">À</button>
    </div>

    <div class="drill-actions">
      <button class="btn btn-primary" onclick="checkAnswers()">✅ Vérifier</button>
      <button class="btn btn-ghost" onclick="revealAll()">👁 Voir les réponses</button>
      <button class="btn btn-ghost" onclick="nextCard()">⏭ Suivant →</button>
    </div>

    <div id="cardFeedback" style="margin-top:12px;display:none;padding:9px 13px;border-radius:10px;font-size:13px;font-weight:700"></div>
  </div>

  <div class="card">
    <div class="h3" style="margin-bottom:6px">📋 Journal de session</div>
    <div class="session-log" id="sessionLog"><div class="muted" style="padding:4px">Les résultats apparaîtront ici…</div></div>
  </div>
</div><!-- /drill -->


<!-- RESULTS PANEL -->
<div id="results">
  <div class="card result-big" id="resultCard">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-score" id="resultScore">—</div>
    <div class="result-sub" id="resultSub">—</div>
    <div class="btn-row" style="justify-content:center;margin-top:16px">
      <button class="btn btn-primary" onclick="restartDrill()">🔄 Recommencer</button>
      <button class="btn btn-ghost" onclick="showSetup()">⚙ Nouvelle sélection</button>
    </div>
    <div class="session-log" id="resultLog" style="max-height:320px;margin-top:16px"></div>
  </div>
</div><!-- /results -->


<script>
// Global error catcher — shows any JS crash visibly on screen
window.onerror = function(msg, src, line, col, err){
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#dc2626;color:#fff;padding:12px 16px;font-size:13px;font-weight:700;z-index:9999;white-space:pre-wrap;';
  div.textContent = '⚠ JS ERROR: ' + msg + '\nLine: ' + line + ' Col: ' + col + '\n' + (err?.stack||'');
  document.body.prepend(div);
  return false;
};

// pronouns: je/tu/il/elle/on/nous/vous/ils/elles

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentLevel = 'common';
let selectedVerbs = new Set();
let selectedTenses = new Set(['PR','PC','IMP','FUT','SUB']);
let queue = [];
let qIdx = 0;
let scoreOk = 0, scoreErr = 0;
let sessionLog = [];
// Safe localStorage wrapper for iframe environments
const safeStorage = {
  get(key, def=''){try{return localStorage.getItem(key)||def;}catch(e){return def;}},
  set(key,val){try{localStorage.setItem(key,val);}catch(e){}},
};
let masteredSet = new Set(JSON.parse(safeStorage.get('conj_mastered','[]')));
let activeInput = null;

// ─────────────────────────────────────────────
// SETUP
// ─────────────────────────────────────────────
function getLevelVerbs(lvl){
  if(lvl==='common') return VERBS.filter(v=>v.level==='common');
  if(lvl==='b1') return VERBS.filter(v=>v.level==='b1');
  if(lvl==='b2') return VERBS.filter(v=>v.level==='b2');
  return VERBS;
}

function setLevel(lvl){
  currentLevel = lvl;
  selectedVerbs.clear();
  document.querySelectorAll('.level-tab').forEach(t=>t.classList.remove('active'));
  const tab = document.getElementById('ltab-'+lvl);
  if(tab) tab.classList.add('active');
  renderVerbGrid();
  updateSelCount();
}

function renderVerbGrid(){
  const grid = document.getElementById('verbGrid');
  const verbs = getLevelVerbs(currentLevel);
  grid.innerHTML = verbs.map(v=>{
    const sel = selectedVerbs.has(v.id) ? ' selected':'';
    const mas = masteredSet.has(v.id) ? ' mastered':'';
    return `<div class="verb-pill${sel}${mas}" data-id="${v.id}" onclick="toggleVerb(${v.id})">${v.inf}${masteredSet.has(v.id)?'✓':''}</div>`;
  }).join('');
}

function toggleVerb(id){
  if(selectedVerbs.has(id)) selectedVerbs.delete(id);
  else selectedVerbs.add(id);
  renderVerbGrid();
  updateSelCount();
}

function selectAll(){
  getLevelVerbs(currentLevel).forEach(v=>selectedVerbs.add(v.id));
  renderVerbGrid(); updateSelCount();
}
function selectNone(){
  selectedVerbs.clear(); renderVerbGrid(); updateSelCount();
}
function selectRandom(n){
  const pool = getLevelVerbs(currentLevel);
  const shuffled = [...pool].sort(()=>Math.random()-.5).slice(0,n);
  selectedVerbs.clear();
  shuffled.forEach(v=>selectedVerbs.add(v.id));
  renderVerbGrid(); updateSelCount();
}
function updateSelCount(){
  document.getElementById('selCount').textContent = selectedVerbs.size + ' sélectionné(s)';
}

// Tense checks — use mousedown to prevent label+checkbox double-fire
document.querySelectorAll('.tense-check').forEach(el=>{
  el.addEventListener('click', e=>{
    e.preventDefault(); // prevent checkbox default so we control state manually
    const t = el.dataset.tense;
    el.classList.toggle('on');
    const inp = el.querySelector('input');
    if(inp) inp.checked = el.classList.contains('on');
    if(el.classList.contains('on')) selectedTenses.add(t);
    else selectedTenses.delete(t);
  });
});

function startDrill(){
  const err = document.getElementById('setupError');
  if(selectedVerbs.size===0){err.textContent='⚠ Sélectionnez au moins un verbe.';err.style.display='block';return;}
  if(selectedTenses.size===0){err.textContent='⚠ Sélectionnez au moins un temps.';err.style.display='block';return;}
  err.style.display='none';

  // Build queue
  const shuffle = document.getElementById('chkShuffle').checked;
  queue = [];
  selectedVerbs.forEach(id=>{
    const verb = VERBS.find(v=>v.id===id);
    if(!verb) return;
    selectedTenses.forEach(tense=>{
      queue.push({verb, tense});
    });
  });
  if(shuffle) queue.sort(()=>Math.random()-.5);
  qIdx = 0; scoreOk = 0; scoreErr = 0; sessionLog = [];

  document.getElementById('setup').style.display='none';
  document.getElementById('results').style.display='none';
  document.getElementById('drill').style.display='block';
  document.getElementById('sessionLog').innerHTML='<div class="muted" style="padding:4px">Les résultats apparaîtront ici…</div>';

  renderCard();
  updateScoreBar();
}

// ─────────────────────────────────────────────
// DRILL
// ─────────────────────────────────────────────
function renderCard(){
  if(qIdx >= queue.length){showResults();return;}
  answersRevealed = false;
  const {verb, tense} = queue[qIdx];
  document.getElementById('drillVerb').textContent = verb.inf;
  document.getElementById('drillTense').textContent = TENSE_LABELS[tense];
  document.getElementById('drillProg').textContent = (qIdx+1)+' / '+queue.length;
  document.getElementById('cardFeedback').style.display='none';

  const conjugations = verb[tense];
  const grid = document.getElementById('pronounGrid');
  grid.innerHTML = PRONOUNS.map((pr,i)=>`
    <div class="pronoun-row" id="row-${i}">
      <span class="pronoun-label">${pr}</span>
      <div style="flex:1">
        <input class="conj-input" id="inp-${i}" placeholder="…" autocomplete="off" autocorrect="off" spellcheck="false"
          onkeydown="handleKey(event,${i})" onfocus="activeInput=this">
        <div class="conj-answer" id="ans-${i}">${conjugations[i]}</div>
      </div>
    </div>`).join('');

  // Focus first input
  setTimeout(()=>{ const f=document.getElementById('inp-0'); if(f) f.focus(); },50);
}

function handleKey(e, idx){
  if(e.key==='Enter'){
    e.preventDefault();
    const next = document.getElementById('inp-'+(idx+1));
    if(next) next.focus();
    else checkAnswers();
  }
  if(e.key==='Tab'){
    e.preventDefault();
    const next = document.getElementById('inp-'+(idx+1));
    if(next) next.focus();
  }
}

function insertAccent(ch){
  if(!activeInput) return;
  const s = activeInput.selectionStart, e = activeInput.selectionEnd;
  activeInput.value = activeInput.value.slice(0,s)+ch+activeInput.value.slice(e);
  activeInput.selectionStart = activeInput.selectionEnd = s+ch.length;
  activeInput.focus();
}

function normalize(s){ return s.trim().toLowerCase().replace(/\s+/g,' '); }

function checkAnswers(){
  const {verb, tense} = queue[qIdx];
  const conjugations = verb[tense];
  let allOk = true;
  let wrongCount = 0;

  PRONOUNS.forEach((pr,i)=>{
    const inp = document.getElementById('inp-'+i);
    const ans = document.getElementById('ans-'+i);
    const userVal = inp.value;

    // Accept either full form or short variant stripped of (e)/(s) etc
    const correct = normalize(conjugations[i]);
    const user = normalize(userVal);
    const isOk = user === correct || matchVariant(user, correct);

    inp.classList.remove('correct','wrong','revealed');
    ans.classList.remove('show');
    if(userVal.trim()==='') {
      // blank — show hints if option on
      if(document.getElementById('chkShowHints').checked){
        inp.classList.add('revealed');
        inp.value = conjugations[i];
        ans.classList.add('show');
      }
      allOk = false; wrongCount++;
    } else if(isOk){
      inp.classList.add('correct');
    } else {
      inp.classList.add('wrong');
      ans.classList.add('show');
      allOk = false; wrongCount++;
    }
  });

  const fb = document.getElementById('cardFeedback');
  if(allOk){
    fb.style.display='block';
    fb.style.background='#dcfce7'; fb.style.color='#15803d'; fb.style.border='1px solid #86efac';
    fb.textContent='✅ Parfait ! Toutes les formes sont correctes.';
    scoreOk++;
    logEntry(verb.inf, tense, true);
    markMastered(verb.id);
  } else {
    fb.style.display='block';
    fb.style.background='#fee2e2'; fb.style.color='#dc2626'; fb.style.border='1px solid #fca5a5';
    fb.textContent=`❌ ${wrongCount} erreur(s). Les corrections s'affichent en orange.`;
    scoreErr++;
    logEntry(verb.inf, tense, false);
  }
  updateScoreBar();
}

function matchVariant(user, correct){
  // strip (e), (s), (e)s variations so "suis allé(e)" matches "suis allée" or "suis allé"
  const stripped = correct.replace(/\([^)]*\)/g,'').replace(/\s+/g,' ').trim();
  return user === stripped;
}

let answersRevealed = false;
function revealAll(){
  const {verb, tense} = queue[qIdx];
  const conjugations = verb[tense];
  const fb = document.getElementById('cardFeedback');
  if(answersRevealed){
    answersRevealed = false;
    PRONOUNS.forEach((pr,i)=>{
      const inp = document.getElementById('inp-'+i);
      const ans = document.getElementById('ans-'+i);
      if(inp.classList.contains('revealed')){ inp.classList.remove('revealed'); inp.value=''; }
      ans.classList.remove('show');
    });
    fb.style.display='none';
    return;
  }
  answersRevealed = true;
  PRONOUNS.forEach((pr,i)=>{
    const inp = document.getElementById('inp-'+i);
    const ans = document.getElementById('ans-'+i);
    inp.classList.remove('correct','wrong');
    inp.classList.add('revealed');
    inp.value = conjugations[i];
    ans.classList.add('show');
  });
  fb.style.display='block';
  fb.style.background='#fef3c7'; fb.style.color='#92400e'; fb.style.border='1px solid #fcd34d';
  fb.textContent='👁 Réponses affichées — cliquez à nouveau pour masquer.';
  scoreErr++;
  logEntry(verb.inf, tense, false);
  updateScoreBar();
}

function nextCard(){
  qIdx++;
  renderCard();
}

function logEntry(verbInf, tense, ok){
  sessionLog.push({verbInf, tense, ok});
  const logEl = document.getElementById('sessionLog');
  const item = document.createElement('div');
  item.className = 'log-item ' + (ok?'ok':'err');
  item.textContent = (ok?'✅':'❌') + ' ' + verbInf + ' — ' + TENSE_LABELS[tense];
  logEl.prepend(item);
}

function updateScoreBar(){
  const total = scoreOk + scoreErr;
  const pct = total > 0 ? Math.round(scoreOk/total*100) : 0;
  document.getElementById('scoreOk').textContent = '✅ ' + scoreOk;
  document.getElementById('scoreErr').textContent = '❌ ' + scoreErr;
  document.getElementById('scoreBar').style.width = pct + '%';
}

function endDrill(){ showResults(); }

function markMastered(id){
  masteredSet.add(id);
  safeStorage.set('conj_mastered', JSON.stringify([...masteredSet]));
}

// ─────────────────────────────────────────────
// RESULTS
// ─────────────────────────────────────────────
function showResults(){
  document.getElementById('drill').style.display='none';
  document.getElementById('results').style.display='block';

  const total = scoreOk + scoreErr;
  const pct = total > 0 ? Math.round(scoreOk/total*100) : 0;
  const emoji = pct>=90?'🏆':pct>=70?'🎉':pct>=50?'🙂':'💪';
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultScore').textContent = scoreOk + ' / ' + total + ' (' + pct + '%)';
  document.getElementById('resultSub').textContent = pct>=90?'Excellent ! Maîtrise parfaite.':pct>=70?'Très bien ! Continuez comme ça.':pct>=50?'Bien essayé. Pratiquez encore ces verbes.':'Ne vous découragez pas — la répétition est la clé !';

  const logEl = document.getElementById('resultLog');
  logEl.innerHTML = sessionLog.map(e=>`<div class="log-item ${e.ok?'ok':'err'}">${e.ok?'✅':'❌'} <strong>${e.verbInf}</strong> — ${TENSE_LABELS[e.tense]}</div>`).join('');
}

function restartDrill(){
  document.getElementById('results').style.display='none';
  qIdx = 0; scoreOk = 0; scoreErr = 0; sessionLog = [];
  if(document.getElementById('chkShuffle').checked) queue.sort(()=>Math.random()-.5);
  document.getElementById('drill').style.display='block';
  document.getElementById('sessionLog').innerHTML='<div class="muted" style="padding:4px">Les résultats apparaîtront ici…</div>';
  renderCard(); updateScoreBar();
}

function showSetup(){
  document.getElementById('results').style.display='none';
  document.getElementById('drill').style.display='none';
  document.getElementById('setup').style.display='block';
  renderVerbGrid(); updateSelCount();
}

// ─────────────────────────────────────────────
// DARK MODE (sync with parent if possible)
// ─────────────────────────────────────────────
function toggleDark(){
  document.body.classList.toggle('dark');
  safeStorage.set('conj_dark', document.body.classList.contains('dark')?'1':'0');
}
if(safeStorage.get('conj_dark')==='1') document.body.classList.add('dark');
// Try to inherit parent dark state
try{
  if(window.parent && window.parent.document.body.classList.contains('dark'))
    document.body.classList.add('dark');
} catch(e){}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
renderVerbGrid();
updateSelCount();
</script>
</body>
</html>
